kind = "web"
previewPath = "/"
title = "METABO AI — Marketing Website"
version = "1.0.0"
id = "artifacts/metabo-ai-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20697

[services.development]
run = "pnpm --filter @workspace/metabo-ai-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/metabo-ai-website", "run", "build" ]
publicDir = "artifacts/metabo-ai-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20697"
BASE_PATH = "/"
